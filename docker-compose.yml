version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: policy-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - policy-network

  redis:
    image: redis:7-alpine
    container_name: policy-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - policy-network

  ai:
    image: python:3.11-slim
    container_name: policy-ai
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./ai/app.py:/app/app.py:ro
    command: >
      sh -c "pip install flask gunicorn &&
             gunicorn -w 2 -b 0.0.0.0:5000 app:app"
    ports:
      - "${AI_PORT}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - policy-network

  backend:
    build: ./backend
    container_name: policy-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai:5000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT}:8080"
    restart: unless-stopped
    networks:
      - policy-network

  frontend:
    build: ./frontend
    container_name: policy-frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - policy-network

volumes:
  postgres_data:

networks:
  policy-network:
    driver: bridge


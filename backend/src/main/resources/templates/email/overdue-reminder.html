<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Policy Overdue</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #c0392b; color: #fff; padding: 20px; text-align: center; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
        .alert { color: #c0392b; font-weight: bold; }
        .policy-name { font-weight: bold; color: #c0392b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>URGENT: Policy Overdue</h1>
    </div>
    <div class="content">
        <p>Hello <span th:text="${policyHolder}">Policy Holder</span>,</p>
        <p class="alert">Your policy <span class="policy-name" th:text="${policyName}">Policy Name</span> is now overdue.</p>
        <p>Please renew it immediately to avoid coverage lapse and potential financial exposure.</p>
        <p>Contact your account manager or log into the Policy Lifecycle Manager to renew today.</p>
    </div>
    <div class="footer">
        <p>Regards,<br>Policy Lifecycle Manager Team</p>
    </div>
</div>
</body>
</html>

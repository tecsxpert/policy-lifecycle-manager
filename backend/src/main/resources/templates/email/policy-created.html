<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Policy Created</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #1B4F8A; color: #fff; padding: 20px; text-align: center; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
        .policy-name { font-weight: bold; color: #1B4F8A; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Policy Lifecycle Manager</h1>
    </div>
    <div class="content">
        <p>Hello <span th:text="${policyHolder}">Policy Holder</span>,</p>
        <p>Your policy <span class="policy-name" th:text="${policyName}">Policy Name</span> has been successfully created in the Policy Lifecycle Manager.</p>
        <p>You can view and manage your policy at any time through the system dashboard.</p>
    </div>
    <div class="footer">
        <p>Regards,<br>Policy Lifecycle Manager Team</p>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>SSE Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #output { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; min-height: 100px; }
  </style>
</head>
<body>
  <h3>Streaming Summary</h3>
  <div id="output">Waiting for stream...</div>
  
  <script>
    const output = document.getElementById('output');
    output.innerText = '';
    
    fetch('http://localhost:5000/generate-report', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: "Our company health insurance policy covers all full-time employees with medical, dental and vision benefits."})
    }).then(response => {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      
      function read() {
        reader.read().then(({done, value}) => {
          if (done) {
            output.innerText += '\n\n[Stream completed]';
            return;
          }
          const chunk = decoder.decode(value);
          // Parse SSE format: data: {...}\n\n
          const lines = chunk.split('\n');
          lines.forEach(line => {
            if (line.startsWith('data: ')) {
              const data = JSON.parse(line.slice(6));
              if (data.token) output.innerText += data.token;
              if (data.error) output.innerText += '\nERROR: ' + data.error;
            }
          });
          read();
        });
      }
      read();
    }).catch(err => {
      output.innerText = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
